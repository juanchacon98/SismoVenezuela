# Configuración de despliegue de Cloudflare Workers usando Wrangler (CLI)
# Para desplegar: npx wrangler deploy

name = "sismo-telemetry-metrics"
main = "cloudflare-worker.js"
compatibility_date = "2024-03-01"

# 1. Rutas y subdominios personalizados
[[routes]]
pattern = "api.vnzl.technolink.tech"
custom_domain = true

# 2. Variables de entorno públicas (no sensibles)
[vars]
BACKEND_API_URL = "https://ayuda-venezuela-backend-291864207498.us-central1.run.app"
GA_MEASUREMENT_ID = "G-XXXXXXXXXX" # Sustituye por tu ID de Medición de GA4
GA_PROPERTY_ID = "498305291"      # Sustituye por tu ID de Propiedad numérico de GA4

# NOTA: Los siguientes secretos y claves sensibles NO deben guardarse en este archivo.
# Debes configurarlos en la consola de Cloudflare o subirlos por línea de comandos usando:
#   echo "tu_secreto" | npx wrangler secret put GA_API_SECRET
#   echo "tu_correo_servicio" | npx wrangler secret put GCP_SERVICE_ACCOUNT_EMAIL
#   npx wrangler secret put GCP_PRIVATE_KEY (pegar la clave PEM completa)
